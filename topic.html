<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MondoAI — Topic</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bd:#3A2008;--bdk:#8B6447;--bm:#C4A47C;--bl:#D4B896;
  --bp:#F5EFE4;--bg:#FBF7F0;--cr:#FFFDF9;
  --tp:#2C1A0A;--ts:#8B6447;--tm:#B89060;--bo:#E8D8C0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:#F0EAE0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
#shell{width:100%;max-width:420px;height:92vh;max-height:780px;min-height:560px;background:var(--cr);border-radius:24px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(58,32,8,.13),0 2px 8px rgba(58,32,8,.08)}
#hdr{flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--bo);padding:12px 18px;display:flex;align-items:center;gap:10px}
.back-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--bl);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--bdk);transition:all .15s;flex-shrink:0}
.back-btn:hover{background:var(--bp)}
#hdr-title{font-size:14px;font-weight:700;color:var(--bdk);letter-spacing:.04em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#hdr-badge{font-size:10px;padding:3px 8px;border-radius:8px;background:var(--bp);color:var(--tm);border:1px solid var(--bl);font-family:'DM Mono',monospace;flex-shrink:0}
#body{flex:1;overflow-y:auto;padding:0}
#body::-webkit-scrollbar{width:3px}
#body::-webkit-scrollbar-thumb{background:var(--bl);border-radius:2px}
#ftr{flex-shrink:0;background:var(--cr);border-top:1px solid var(--bo);padding:11px 16px;display:none}
.fb{width:100%;padding:13px;border-radius:13px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .18s;letter-spacing:.03em;font-family:'Zen Kaku Gothic New',sans-serif}
.fb.primary{background:var(--bm);color:white}
.fb.primary:hover{background:var(--bdk);transform:translateY(-1px)}
.fb.primary:active{transform:scale(.97)}
.fb.ghost{background:transparent;color:var(--bm);border:1.5px solid var(--bl)}
.fb.ghost:hover{background:var(--bg)}
/* TOPIC LIST */
.tl-wrap{padding:16px}
.tl-head{font-size:11px;color:var(--tm);letter-spacing:.1em;font-weight:500;text-transform:uppercase;margin-bottom:10px}
.tc{background:var(--cr);border:0.5px solid var(--bo);border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px}
.tc:hover{background:var(--bg);border-color:var(--bl);transform:translateX(2px)}
.tc.done{border-color:var(--bm);background:var(--bp)}
.tc-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.tc-info{flex:1;min-width:0}
.tc-name{font-size:13px;font-weight:700;color:var(--tp);margin-bottom:2px}
.tc-sub{font-size:11px;color:var(--ts);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-badge{width:22px;height:22px;border-radius:50%;background:var(--bm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tc-lock{width:22px;height:22px;border-radius:50%;background:var(--bo);display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* TOPIC DETAIL */
.td-wrap{padding:16px}
.td-explabel{font-size:10px;color:var(--tm);letter-spacing:.08em;font-weight:500;margin-bottom:8px;text-transform:uppercase}
.exp-scroll{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px}
.exp-scroll::-webkit-scrollbar{display:none}
.expbtn{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--bl);background:var(--cr);color:var(--ts);transition:all .15s;font-family:'Zen Kaku Gothic New',sans-serif;white-space:nowrap}
.expbtn.active{background:var(--bp);border-color:var(--bm);color:var(--bd)}
.expbtn:hover:not(.active){background:var(--bg)}
.exp-card{background:var(--bg);border:1px solid var(--bo);border-radius:14px;padding:16px;margin-bottom:12px;min-height:120px}
.exp-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 9px;border-radius:10px;background:var(--bp);color:var(--tm);border:1px solid var(--bl);margin-bottom:10px;font-weight:500}
.exp-text{font-size:13px;color:var(--tp);line-height:1.85}
.exp-text strong{color:var(--bdk);font-weight:700}
.td-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.act-btn{padding:12px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--bl);background:var(--cr);color:var(--ts);transition:all .18s;font-family:'Zen Kaku Gothic New',sans-serif;text-align:center}
.act-btn.check{background:var(--bm);color:white;border-color:var(--bm);grid-column:span 2}
.act-btn:hover{background:var(--bg)}
.act-btn.check:hover{background:var(--bdk)}
/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:100%}
.chat-msgs{flex:1;overflow-y:auto;padding:14px 14px 4px}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--bl);border-radius:2px}
.msg{display:flex;gap:8px;margin-bottom:12px;animation:fd .25s ease}
.msg.ai{flex-direction:row}
.msg.user{flex-direction:row-reverse}
.msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bp);border:1px solid var(--bl);font-size:12px}
.msg-bubble{max-width:78%;padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.7}
.msg.ai .msg-bubble{background:var(--bg);border:0.5px solid var(--bo);color:var(--tp);border-radius:4px 14px 14px 14px}
.msg.user .msg-bubble{background:var(--bm);color:white;border-radius:14px 14px 4px 14px}
.chat-input-area{flex-shrink:0;padding:10px 12px;border-top:1px solid var(--bo);background:var(--cr);display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;border:1px solid var(--bl);border-radius:12px;padding:9px 13px;font-size:13px;color:var(--tp);background:var(--bg);resize:none;outline:none;font-family:'Zen Kaku Gothic New',sans-serif;max-height:100px;min-height:40px}
.chat-input:focus{border-color:var(--bm)}
.send-btn{width:38px;height:38px;border-radius:50%;background:var(--bm);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.send-btn:hover{background:var(--bdk)}
.send-btn:disabled{background:var(--bl);cursor:default}
.typing{display:flex;gap:4px;padding:8px 4px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--bl);animation:dot 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.5}40%{transform:scale(1);opacity:1}}
/* BADGE AWARD */
.badge-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px;text-align:center}
@keyframes pop{0%{transform:scale(0) rotate(-20deg);opacity:0}70%{transform:scale(1.15) rotate(3deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes glow{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes fd{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shine{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.badge-ring{width:120px;height:120px;position:relative;margin:0 auto 20px;animation:pop .6s cubic-bezier(.34,1.56,.64,1)}
.confetti-bit{position:absolute;width:6px;height:6px;border-radius:1px;animation:conf 1.2s ease-out forwards}
@keyframes conf{0%{transform:translate(0,0) rotate(0deg);opacity:1}100%{transform:translate(var(--tx),var(--ty)) rotate(360deg);opacity:0}}
</style>
</head>
<body>
<div id="shell">
  <div id="hdr">
    <button class="back-btn" id="back-btn" onclick="goBack()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div id="hdr-title">トピック一覧</div>
    <div id="hdr-badge" style="display:none"></div>
  </div>
  <div id="body"></div>
  <div id="ftr"></div>
</div>

<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━ DATA ━━━━━━━━━━━━━━━━━━━━━━━━ */
const TOPICS=[
  {
    id:1,icon:'🤖',name:'生成AIと従来AIの違い',sub:'AIの基本概念を理解する',done:false,
    explanations:[
      {label:'基本解説',tag:'📘 スタンダード',funny:false,text:`<strong>従来のAI</strong>は、決まったルールやパターンを学習して「分類・予測」を行います。例えば「この画像は猫か犬か」を判定するのが得意です。\n\nそれに対して<strong>生成AI</strong>は、大量のデータから「次に来るものを予測する」ことを繰り返して、文章・画像・コードなどを<strong>新しく作り出す</strong>ことができます。\n\nChatGPTやCopilotはこの生成AIです。質問に答えたり文章を作ったりできるのはそのためです。`},
      {label:'料理で例えると',tag:'🍳 料理',funny:false,text:`従来のAIは<strong>「この料理は何ですか？」</strong>と聞かれて答える「味見係」です。見て判定するのが仕事。\n\n生成AIは<strong>「何か美味しいもの作って」</strong>と言われてレシピを考えて料理を作る「シェフ」です。\n\nどちらも「料理が分かる」けど、<strong>判定するか・作り出すかが根本的に違います。</strong>`},
      {label:'図書館で例えると',tag:'📚 図書館',funny:false,text:`従来のAIは<strong>「この本はどの棚にありますか？」</strong>を教えてくれる優秀な司書です。分類・検索が得意。\n\n生成AIは<strong>「こういう内容の本を書いて」</strong>と頼むと、図書館中の本を読んで新しい本を書いてくれる作家です。\n\n<strong>既存のものを整理するか・新しいものを生み出すか。</strong>これが一番の違いです。`},
      {label:'工場で例えると',tag:'🏭 製造',funny:false,text:`従来のAIは<strong>品質検査の機械</strong>です。流れてくる製品が「合格か不合格か」を判定します。決められた基準で動きます。\n\n生成AIは<strong>設計者＋職人</strong>です。「こういうものが欲しい」という要望をもとに、設計図を引いて実際に作り上げます。\n\n<strong>判定する機械 vs 作り出す職人。</strong>これが従来AIと生成AIの違いです。`},
      {label:'子どもに説明するなら',tag:'🧒 シンプル',funny:false,text:`従来のAIは<strong>「これは何？」</strong>という質問に答えるのが上手なコンピューターです。写真を見て「これは犬！」と答えられます。\n\n生成AIは<strong>「お話を作って」「絵を描いて」</strong>と頼むと、自分で考えて新しいものを作れるコンピューターです。\n\n<strong>見て答える ⇔ 考えて作る。</strong>これが大きな違いです。`},
      {label:'上司と部下で例えると',tag:'💼 ビジネス',funny:false,text:`従来のAIは<strong>「これは承認できます」「これはNGです」</strong>と判断する審査担当者です。基準に沿って決裁します。\n\n生成AIは<strong>「この企画書、作っておきました」</strong>と言ってくれる優秀な部下です。指示すれば何か作ってきます。\n\n<strong>承認する人 vs 作ってくる人。</strong>どちらも必要ですが、役割がまったく違います。`},
      {label:'🐱 猫視点で考えると',tag:'🐱 ふざけ①',funny:true,text:`従来のAIは<strong>「この人間、エサをくれる人かどうか」</strong>を見分ける猫の本能です。パターンで判定します（私は何万年もこれをやってきた）。\n\n生成AIは<strong>「今日の毛づくろいの詩を作ろう」</strong>と思い立って実際に詠む猫の創造性です。\n\n<strong>人間を分類する vs 詩を詠む。</strong>猫はどちらもやりますが、AIの世界では専門が違います。にゃ。`},
      {label:'🛸 宇宙人に説明するなら',tag:'🛸 ふざけ②',funny:true,text:`従来のAIは地球を観察して<strong>「あれはヒト科、あれはネコ科」</strong>と分類する宇宙人の調査装置です。\n\n生成AIは<strong>「地球の言語を真似して交信文を作る」</strong>宇宙人のコミュニケーション装置です。\n\n<strong>観察・分類する ⇔ 生成・発信する。</strong>あなたの星にも似たような技術があるのではないでしょうか？👽`},
      {label:'スポーツで例えると',tag:'⚽ スポーツ',funny:false,text:`従来のAIは<strong>審判</strong>です。「ファウルか、セーフか」を判定するのが仕事。ルールに沿って正確に判断します。\n\n生成AIは<strong>コーチ兼プレイヤー</strong>です。「次の作戦を考えて」と言えば戦術を立案し、必要なら実行もします。\n\n<strong>判定する審判 vs 考えて動くコーチ。</strong>どちらも試合に必要ですが、役割はまったく違います。`},
      {label:'翻訳者で例えると',tag:'🌐 言語',funny:false,text:`従来のAIは<strong>「この文書は日本語ですか、英語ですか？」</strong>を見分ける言語識別システムです。\n\n生成AIは<strong>「このニュアンスで日本語に訳して」</strong>と頼むと文脈を理解して翻訳し、さらに「読みやすくして」と言えば書き直してくれる通訳者です。\n\n<strong>識別する ⇔ 理解して生み出す。</strong>生成AIは言語を「道具として使いこなす」点が根本的に違います。`},
    ]
  },
  {id:2,icon:'⚠️',name:'ハルシネーションとは',sub:'AIの嘘を見抜く力をつける',done:false},
  {id:3,icon:'🔐',name:'入力してはいけない情報',sub:'安全な使い方の基本ルール',done:false},
  {id:4,icon:'✅',name:'承認済みツールの確認',sub:'シャドーITを防ぐ第一歩',done:false},
  {id:5,icon:'🛡️',name:'AIが生むセキュリティリスク',sub:'ノーコード・自動生成の落とし穴',done:false},
];

/* ━━━━━━━━━━━━━━━━━━━━━━━━ STATE ━━━━━━━━━━━━━━━━━━━━━━━━ */
let view='list',curTopic=null,curExp=0;
let chatHistory=[],chatDone=false,awaitingAns=false,correctAns=null;
const stack=[];

/* ━━━━━━━━━━━━━━━━━━━━━━━━ NAV ━━━━━━━━━━━━━━━━━━━━━━━━ */
function push(v){stack.push(view);view=v;render()}
function goBack(){
  if(stack.length){view=stack.pop();render()}
  else window.history.back()
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━ RENDER ━━━━━━━━━━━━━━━━━━━━━━━━ */
function render(){
  if(view==='list')renderList();
  else if(view==='detail')renderDetail();
  else if(view==='check')renderCheck();
  else if(view==='badge')renderBadge();
}

/* — LIST — */
function renderList(){
  document.getElementById('hdr-title').textContent='トピック一覧';
  document.getElementById('hdr-badge').style.display='none';
  document.getElementById('ftr').style.display='none';
  document.getElementById('body').innerHTML=`
    <div class="tl-wrap">
      <div class="tl-head">前期トピック</div>
      ${TOPICS.map(t=>`
        <div class="tc${t.done?' done':''}" onclick="${t.explanations?`selTopic(${t.id})`:'void 0'}">
          <div class="tc-icon" style="background:${t.done?'#F5EFE4':'#F0EAE0'}">${t.icon}</div>
          <div class="tc-info">
            <div class="tc-name">${t.name}</div>
            <div class="tc-sub">${t.sub}</div>
          </div>
          ${t.done
            ?`<div class="tc-badge"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>`
            :t.explanations
              ?`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C4A47C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`
              :`<div class="tc-lock"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#B89060" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>`
          }
        </div>`).join('')}
      <div style="margin-top:16px;padding:12px 14px;background:var(--bg);border:0.5px solid var(--bo);border-radius:12px;font-size:12px;color:var(--ts);line-height:1.7">
        まずは気になるトピックから始めてください。<br>どの順番でも大丈夫です。
      </div>
    </div>`;
}

function selTopic(id){
  curTopic=TOPICS.find(t=>t.id===id);
  curExp=0;
  push('detail');
}

/* — DETAIL — */
function renderDetail(){
  const t=curTopic;
  const ex=t.explanations[curExp];
  document.getElementById('hdr-title').textContent=t.name;
  document.getElementById('hdr-badge').style.display='block';
  document.getElementById('hdr-badge').textContent=`${curExp+1}/10`;
  document.getElementById('ftr').style.display='none';
  document.getElementById('body').innerHTML=`
    <div class="td-wrap">
      <div class="td-explabel">解説を選ぶ</div>
      <div class="exp-scroll" id="expscroll">
        ${t.explanations.map((e,i)=>`
          <button class="expbtn${i===curExp?' active':''}" onclick="switchExp(${i})">${e.label}</button>
        `).join('')}
      </div>
      <div class="exp-card" id="expcard">
        <div class="exp-tag">${ex.tag}</div>
        <div class="exp-text">${ex.text.replace(/\n\n/g,'</div><div class="exp-text" style="margin-top:10px">').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>
      </div>
      <div class="td-actions">
        <div class="act-btn" onclick="saveAndIndex()" style="font-size:12px">
          <div style="font-size:16px;margin-bottom:3px">💾</div>セーブして<br>Indexへ
        </div>
        <div class="act-btn" onclick="void 0" style="font-size:12px;opacity:.5">
          <div style="font-size:16px;margin-bottom:3px">📊</div>アセスメント<br>（SharePoint）
        </div>
        <div class="act-btn check" onclick="startCheck()">チェックへ進む →</div>
      </div>
    </div>`;
  // scroll active button into view
  setTimeout(()=>{
    const sc=document.getElementById('expscroll');
    const ab=sc.querySelector('.active');
    if(ab)ab.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },50);
}

function switchExp(i){
  curExp=i;
  renderDetail();
}
function saveAndIndex(){alert('進捗を保存してIndexに戻ります');}

/* — CHECK / CHAT — */
function renderCheck(){
  chatHistory=[];chatDone=false;awaitingAns=false;
  document.getElementById('hdr-title').textContent='チェック';
  document.getElementById('hdr-badge').style.display='block';
  document.getElementById('hdr-badge').textContent=curTopic.name.slice(0,8)+'…';
  document.getElementById('ftr').style.display='none';
  document.getElementById('body').innerHTML=`
    <div class="chat-wrap" style="height:100%">
      <div class="chat-msgs" id="msgs"></div>
      <div class="chat-input-area">
        <textarea class="chat-input" id="cinput" rows="1" placeholder="メッセージを入力…" onkeydown="kd(event)"></textarea>
        <button class="send-btn" id="sendbtn" onclick="sendMsg()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>`;
  // auto-resize textarea
  const inp=document.getElementById('cinput');
  inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px'});
  // initial AI greeting
  aiGreeting();
}

function kd(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}

function addMsg(role,text){
  const msgs=document.getElementById('msgs');
  const div=document.createElement('div');
  div.className=`msg ${role}`;
  const av=role==='ai'
    ?'<div class="msg-av">🤖</div>'
    :'<div class="msg-av" style="background:var(--bm);border-color:var(--bm);color:white;font-size:10px;font-weight:700">あ</div>';
  div.innerHTML=`${role==='ai'?av:''}<div class="msg-bubble">${text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>${role==='user'?av:''}`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function addTyping(){
  const msgs=document.getElementById('msgs');
  const div=document.createElement('div');
  div.className='msg ai';div.id='typing-ind';
  div.innerHTML=`<div class="msg-av">🤖</div><div class="msg-bubble" style="padding:8px 13px"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function removeTyping(){
  const t=document.getElementById('typing-ind');
  if(t)t.remove();
}

function setSendDisabled(v){
  const b=document.getElementById('sendbtn');
  const i=document.getElementById('cinput');
  if(b)b.disabled=v;
  if(i)i.disabled=v;
}

async function aiGreeting(){
  setSendDisabled(true);
  addTyping();
  await sleep(900);
  removeTyping();
  addMsg('ai',`${curTopic.name}の解説を読みましたね。\n\nいくつか話しながら理解を確認しましょう。難しく考えなくて大丈夫です。\n\nまず聞かせてください。**生成AIと従来のAIは、何が一番違うと思いますか？** 自分の言葉で教えてください。`);
  chatHistory.push({role:'assistant',content:'生成AIと従来のAIは、何が一番違うと思いますか？自分の言葉で教えてください。'});
  setSendDisabled(false);
  document.getElementById('cinput')?.focus();
}

async function sendMsg(){
  const inp=document.getElementById('cinput');
  if(!inp)return;
  const text=inp.value.trim();
  if(!text)return;
  inp.value='';inp.style.height='auto';
  addMsg('user',text);
  chatHistory.push({role:'user',content:text});
  setSendDisabled(true);
  addTyping();
  const reply=await callClaude(text);
  removeTyping();
  addMsg('ai',reply.text);
  chatHistory.push({role:'assistant',content:reply.text});
  if(reply.passed){
    setSendDisabled(true);
    setTimeout(()=>push('badge'),1200);
  } else {
    setSendDisabled(false);
    document.getElementById('cinput')?.focus();
  }
}

async function callClaude(userText){
  const sys=`あなたはAIリテラシー学習アプリのチェック担当AIです。
トピック：「生成AIと従来AIの違い」
対象：ITパスポート保有レベルの社会人（AI初心者）

ソクラテス式の対話でユーザーの理解を確認してください。
・最大4〜5往復で完結させる
・難しい言葉を避ける
・理解が足りない箇所は自然に補足する（「戻りますね」と言わない）
・理解できたと判断したら最後に必ずシナリオ型の締め問題を1問出す

【締め問題の例】
「同僚が『ChatGPTで作ったExcelマクロをそのまま使って』と言いました。あなたならどうしますか？」

【合格の条件】
・生成AIが「作り出す」ものだと理解している
・従来AIとの違いを自分の言葉で表現できる

【重要】
ユーザーが締め問題に正しく答えた（承認済みか確認する・IT部門に聞くなど）場合は、
必ず最後の一文を「PASS::」で始めてください（例：PASS::よく理解できています！）
それ以外の返答にはPASS::を含めないでください。
返答は150字以内で簡潔に。`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:400,
        system:sys,
        messages:chatHistory
      })
    });
    const d=await resp.json();
    const raw=d.content?.[0]?.text||'すみません、もう一度教えてください。';
    const passed=raw.startsWith('PASS::');
    const text=passed?raw.replace('PASS::',''):raw;
    return{text,passed};
  }catch(e){
    return{text:'接続エラーが発生しました。もう一度試してください。',passed:false};
  }
}
