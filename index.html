<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MondoAI — Index</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --brown-darkest:#3A2008;
  --brown-dark:#8B6447;
  --brown-mid:#C4A47C;
  --brown-light:#D4B896;
  --brown-pale:#F5EFE4;
  --brown-bg:#FBF7F0;
  --cream:#FFFDF9;
  --text-primary:#2C1A0A;
  --text-secondary:#8B6447;
  --text-muted:#B89060;
  --border:#E8D8C0;
  --border-mid:#D4B896;
  --bc0:#D0CCC4;--bc1:#C4A47C;--bc2:#D4A440;--bc3:#E8D070;--bc4:#FFF8D0;
  --ec0:#808078;--ec1:#FF8040;--ec2:#FF6020;--ec3:#FF9000;--ec4:#FFD040;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Zen Kaku Gothic New',sans-serif;
  background:#F0EAE0;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  padding:16px;
}
#shell{
  width:100%;max-width:420px;
  height:92vh;max-height:780px;
  min-height:560px;
  background:var(--cream);
  border-radius:24px;
  overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 8px 40px rgba(58,32,8,.13),0 2px 8px rgba(58,32,8,.08);
  position:relative;
}
/* HEADER */
#hdr{
  flex-shrink:0;
  background:var(--brown-bg);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  display:flex;align-items:center;gap:8px;
}
.logo-text{
  font-size:18px;font-weight:700;color:var(--brown-dark);letter-spacing:.06em;
  font-family:'DM Mono',monospace;
}
.logo-badge{
  font-size:9px;padding:2px 6px;border-radius:6px;
  background:var(--brown-pale);color:var(--brown-mid);
  border:1px solid var(--border-mid);letter-spacing:.05em;font-weight:500;
}
#hdr-mode{
  font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:.04em;
  padding:3px 10px;border-radius:20px;
  background:transparent;border:1px solid transparent;
  transition:all .3s;
}
#hdr-mode.active{
  background:var(--brown-pale);border-color:var(--border-mid);color:var(--brown-dark);
}
/* USER BAR */
#ubar{
  flex-shrink:0;
  background:var(--cream);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
}
#ubar-label{
  font-size:9px;color:var(--text-muted);letter-spacing:.1em;font-weight:500;
  margin-bottom:8px;text-transform:uppercase;
}
#ulist{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
#ulist::-webkit-scrollbar{display:none}
.ua{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;padding:6px 12px;border-radius:12px;
  border:1.5px solid transparent;transition:all .2s;
  flex-shrink:0;
}
.ua:hover{background:var(--brown-bg);border-color:var(--border-mid)}
.ua.sel{background:var(--brown-pale);border-color:var(--brown-mid)}
.av{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;
  background:var(--brown-pale);color:var(--brown-dark);
  border:1.5px solid var(--border-mid);
  transition:all .2s;font-family:'DM Mono',monospace;
}
.ua.sel .av{background:var(--brown-mid);color:white;border-color:var(--brown-mid)}
.uname{font-size:10px;color:var(--text-muted);transition:color .2s}
.ua.sel .uname{color:var(--brown-dark);font-weight:500}
/* BODY */
#body{
  flex:1;overflow-y:auto;padding:18px 16px;
  scroll-behavior:smooth;
}
#body::-webkit-scrollbar{width:3px}
#body::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:2px}
/* FOOTER */
#ftr{
  flex-shrink:0;
  background:var(--cream);
  border-top:1px solid var(--border);
  padding:12px 16px;
  transition:all .3s;
}
.ftr-btn{
  width:100%;padding:14px;border-radius:14px;
  font-size:14px;font-weight:700;cursor:pointer;
  border:none;transition:all .2s;letter-spacing:.04em;
  font-family:'Zen Kaku Gothic New',sans-serif;
}
.ftr-btn.primary{background:var(--brown-mid);color:white}
.ftr-btn.primary:hover{background:var(--brown-dark);transform:translateY(-1px)}
.ftr-btn.primary:active{transform:translateY(0) scale(.97)}
.ftr-btn.ghost{background:transparent;color:var(--brown-mid);border:1.5px solid var(--border-mid)}
.ftr-btn.ghost:hover{background:var(--brown-bg)}
/* EMPTY STATE */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:12px;color:var(--text-muted);font-size:13px;text-align:center;
}
/* ROBOT SVG HELPERS */
@keyframes wave{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pop{0%{transform:scale(.3) rotate(-15deg);opacity:0}70%{transform:scale(1.1) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes fd{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes shine{0%,100%{opacity:.6}50%{opacity:1}}
/* PROGRESS BAR */
.pbar-wrap{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;background:var(--brown-mid);border-radius:3px;transition:width .6s ease}
/* SUGOROKU */
.sg-grid{display:grid;grid-template-rows:repeat(4,1fr);gap:4px}
.sg-row{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.sq{
  background:var(--cream);border:0.5px solid var(--border);
  border-radius:6px;min-height:38px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  transition:all .2s;position:relative;
}
.sq.cur{background:var(--brown-pale);border:1.5px solid var(--brown-mid)}
.sq.done{background:var(--brown-bg)}
.sq.ms{border-color:var(--border-mid)}
.sq.ms.done{border-color:var(--brown-mid);background:#FFF8F0}
.sq-num{font-size:7px;font-weight:500;font-family:'DM Mono',monospace}
/* SPEECH BUBBLE */
.bubble{
  background:var(--brown-pale);
  border:1.5px solid var(--brown-mid);
  border-radius:14px 14px 14px 4px;
  padding:12px 16px;
  font-size:12px;color:var(--brown-dark);
  line-height:1.7;
  animation:fd .4s ease .3s both;
}
/* CARD */
.card{
  background:var(--cream);border:0.5px solid var(--border);
  border-radius:14px;padding:14px;
  margin-bottom:10px;
}
/* ASSESSMENT */
.q-opt{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;border-radius:10px;
  border:1px solid var(--border);cursor:pointer;
  font-size:13px;color:var(--text-primary);
  transition:all .15s;margin-bottom:7px;
  background:var(--cream);
}
.q-opt:hover{background:var(--brown-bg);border-color:var(--border-mid)}
.q-opt.sel{background:var(--brown-pale);border-color:var(--brown-mid);color:var(--brown-dark)}
.q-circle{
  width:22px;height:22px;border-radius:50%;
  border:1.5px solid var(--border-mid);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;flex-shrink:0;color:var(--brown-mid);
  font-family:'DM Mono',monospace;font-weight:500;
  transition:all .15s;
}
.q-opt.sel .q-circle{background:var(--brown-mid);color:white;border-color:var(--brown-mid)}
.sp-btn{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;color:var(--brown-mid);
  background:transparent;border:1px solid var(--border-mid);
  border-radius:8px;padding:5px 10px;cursor:pointer;
  font-family:'Zen Kaku Gothic New',sans-serif;
  transition:all .15s;margin-top:8px;
}
.sp-btn:hover{background:var(--brown-pale)}
</style>
</head>
<body>
<div id="shell">

  <div id="hdr">
    <div class="logo">
      <div class="logo-text">MondoAI</div>
      <div class="logo-badge">β</div>
    </div>
    <div id="hdr-mode"></div>
  </div>

  <div id="ubar">
    <div id="ubar-label">メンバーを選んでください</div>
    <div id="ulist"></div>
  </div>

  <div id="body">
    <div class="empty">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="20" stroke="#D4B896" stroke-width="1.5" stroke-dasharray="4 3"/>
        <path d="M24 14v10l6 4" stroke="#C4A47C" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div>メンバーを選ぶと<br>進捗が表示されます</div>
    </div>
  </div>

  <div id="ftr" style="display:none"></div>

</div>

<script>
const BC=['#D0CCC4','#C4A47C','#D4A440','#E8D070','#FFF8D0'];
const EC=['#808078','#FF8040','#FF6020','#FF9000','#FFD040'];

const USERS=[
  {id:'A',name:'利川',days:0,badges:0,first:true},
  {id:'B',name:'木田',days:12,badges:6,first:false,prev:'生成AIとAIの違い'},
  {id:'C',name:'徳永',days:8,badges:3,first:false,prev:'ハルシネーション'},
  {id:'D',name:'中野',days:5,badges:1,first:false,prev:'生成AIの基本'},
];

const SHAREPOINT_URL='https://sharepoint.example.com/assessment';// ← URLをここに入れる

let curUser=null;

/* ── ROBOT ── */
function robot(bd,sz,anim){
  const lv=Math.min(Math.floor(bd/5),4);
  const bc=BC[lv],ec=EC[lv],aH=[6,10,14,18,22][lv];
  const eyeG=bd>=1,antG=bd>=2,chst=bd>=3,shP=bd>=5,cape=bd>=7,aura=bd>=10,wngs=bd>=15,done=bd>=20;
  let p='';
  if(aura){
    const ar=38+Math.min((bd-10)*1.5,20),ao=Math.min(.35,(bd-10)*.025).toFixed(2);
    p+=`<circle cx="50" cy="70" r="${ar}" fill="${ec}" opacity="${ao}"/>`;
  }
  if(wngs){
    const wo=Math.min(.7,.2+(bd-15)*.1).toFixed(2);
    p+=`<path d="M22 64Q2 46 20 74" fill="${bc}" stroke="${bc}" stroke-width="1.2" opacity="${wo}"/>`;
    p+=`<path d="M78 64Q98 46 80 74" fill="${bc}" stroke="${bc}" stroke-width="1.2" opacity="${wo}"/>`;
  }
  if(cape)p+=`<path d="M30 73Q50 90 70 73L66 110Q50 120 34 110Z" fill="${bc}" stroke="#8B6447" stroke-width="1" opacity=".45"/>`;
  if(shP){
    p+=`<rect x="14" y="58" width="14" height="12" rx="3" fill="${bc}" stroke="#8B6447" stroke-width="1"/>`;
    p+=`<rect x="72" y="58" width="14" height="12" rx="3" fill="${bc}" stroke="#8B6447" stroke-width="1"/>`;
  }
  p+=`<rect x="14" y="63" width="13" height="26" rx="5" fill="${bc}" stroke="#8B6447" stroke-width="1.5"/>`;
  p+=`<rect x="73" y="63" width="13" height="26" rx="5" fill="${bc}" stroke="#8B6447" stroke-width="1.5"/>`;
  p+=`<rect x="34" y="99" width="14" height="19" rx="4" fill="${bc}" stroke="#8B6447" stroke-width="1.5"/>`;
  p+=`<rect x="52" y="99" width="14" height="19" rx="4" fill="${bc}" stroke="#8B6447" stroke-width="1.5"/>`;
  p+=`<rect x="26" y="58" width="48" height="44" rx="7" fill="${bc}" stroke="#8B6447" stroke-width="1.5"/>`;
  if(chst){
    const ci=Math.min(.35,.1+(bd-3)*.04).toFixed(2);
    p+=`<rect x="36" y="66" width="28" height="20" rx="3" fill="${ec}" opacity="${ci}"/>`;
    if(bd>=8)for(let i=0;i<3;i++)p+=`<rect x="${40+i*8}" y="${78-i*2}" width="5" height="${4+i*2}" rx="1" fill="${ec}" opacity=".7"/>`;
  }
  p+=`<rect x="43" y="50" width="14" height="10" fill="${bc}" stroke="#8B6447" stroke-width="1.2"/>`;
  p+=`<rect x="25" y="20" width="50" height="32" rx="${lv>=2?9:4}" fill="${bc}" stroke="#8B6447" stroke-width="1.5"/>`;
  p+=`<line x1="50" y1="20" x2="50" y2="${20-aH}" stroke="#8B6447" stroke-width="1.5" stroke-linecap="round"/>`;
  p+=`<circle cx="50" cy="${20-aH}" r="4" fill="${antG?ec:bc}" stroke="#8B6447" stroke-width="1.2"/>`;
  if(done){
    p+=`<circle cx="50" cy="${20-aH}" r="8" fill="${ec}" opacity=".3"/>`;
    p+=`<line x1="28" y1="22" x2="20" y2="${16-aH*.4}" stroke="#8B6447" stroke-width="1" stroke-linecap="round"/>`;
    p+=`<circle cx="19" cy="${15-aH*.4}" r="3" fill="${ec}" stroke="#8B6447" stroke-width="1"/>`;
    p+=`<line x1="72" y1="22" x2="80" y2="${16-aH*.4}" stroke="#8B6447" stroke-width="1" stroke-linecap="round"/>`;
    p+=`<circle cx="81" cy="${15-aH*.4}" r="3" fill="${ec}" stroke="#8B6447" stroke-width="1"/>`;
  }else if(lv>=2){
    p+=`<line x1="32" y1="22" x2="26" y2="${17-aH*.5}" stroke="#8B6447" stroke-width="1" stroke-linecap="round"/>`;
    p+=`<circle cx="26" cy="${16-aH*.5}" r="2.5" fill="${ec}" stroke="#8B6447" stroke-width=".8"/>`;
    p+=`<line x1="68" y1="22" x2="74" y2="${17-aH*.5}" stroke="#8B6447" stroke-width="1" stroke-linecap="round"/>`;
    p+=`<circle cx="74" cy="${16-aH*.5}" r="2.5" fill="${ec}" stroke="#8B6447" stroke-width=".8"/>`;
  }
  const er=6;
  p+=`<ellipse cx="38" cy="34" rx="${er}" ry="${er}" fill="white" stroke="#8B6447" stroke-width="1.2"/>`;
  p+=`<ellipse cx="62" cy="34" rx="${er}" ry="${er}" fill="white" stroke="#8B6447" stroke-width="1.2"/>`;
  p+=`<circle cx="38" cy="34" r="${er-1.5}" fill="${eyeG?ec:'#3A2008'}"/>`;
  p+=`<circle cx="62" cy="34" r="${er-1.5}" fill="${eyeG?ec:'#3A2008'}"/>`;
  if(eyeG){
    p+=`<circle cx="38" cy="34" r="${er+3}" fill="${ec}" opacity=".1"/>`;
    p+=`<circle cx="62" cy="34" r="${er+3}" fill="${ec}" opacity=".1"/>`;
  }
  p+=`<circle cx="36" cy="32" r="1.6" fill="white" opacity=".9"/>`;
  p+=`<circle cx="60" cy="32" r="1.6" fill="white" opacity=".9"/>`;
  if(lv>=2)p+=`<path d="M35 46Q50 54 65 46" fill="none" stroke="#8B6447" stroke-width="2.2" stroke-linecap="round"/>`;
  else p+=`<line x1="36" y1="46" x2="64" y2="46" stroke="#8B6447" stroke-width="2" stroke-linecap="round"/>`;
  const an=anim?`style="animation:${anim}"`:'';
  return`<svg viewBox="0 0 100 122" width="${sz}" height="${Math.round(sz*1.22)}" xmlns="http://www.w3.org/2000/svg" ${an}>${p}</svg>`;
}

function miniRobot(bd){
  const lv=Math.min(Math.floor(bd/5),4);
  const bc=BC[lv],ec=EC[lv];
  return`<svg viewBox="0 0 30 34" width="15" height="17" xmlns="http://www.w3.org/2000/svg">
    <line x1="15" y1="6" x2="15" y2="2" stroke="#8B6447" stroke-width="1" stroke-linecap="round"/>
    <circle cx="15" cy="1.5" r="1.5" fill="${ec}" stroke="#8B6447" stroke-width=".6"/>
    <rect x="5" y="6" width="20" height="14" rx="2.5" fill="${bc}" stroke="#8B6447" stroke-width="1"/>
    <circle cx="11" cy="13" r="2.8" fill="white" stroke="#8B6447" stroke-width=".7"/>
    <circle cx="19" cy="13" r="2.8" fill="white" stroke="#8B6447" stroke-width=".7"/>
    <circle cx="11" cy="13" r="1.5" fill="${ec}"/><circle cx="19" cy="13" r="1.5" fill="${ec}"/>
    <rect x="11" y="20" width="4" height="5.5" rx="1.5" fill="${bc}" stroke="#8B6447" stroke-width=".7"/>
    <rect x="17" y="20" width="4" height="5.5" rx="1.5" fill="${bc}" stroke="#8B6447" stroke-width=".7"/>
    <rect x="2" y="8" width="3.5" height="7" rx="1.5" fill="${bc}" stroke="#8B6447" stroke-width=".7"/>
    <rect x="24.5" y="8" width="3.5" height="7" rx="1.5" fill="${bc}" stroke="#8B6447" stroke-width=".7"/>
  </svg>`;
}

/* ── SUGOROKU ── */
function sqPos(n){
  if(n<=5)return{r:3,c:n-1};
  if(n<=10)return{r:2,c:10-n};
  if(n<=15)return{r:1,c:n-11};
  return{r:0,c:20-n};
}
function nxtMs(bd){
  const n=[5,10,15,20].find(m=>m>bd);
  return n?`次のマイルストーンまで ${n-bd} バッジ`:'全バッジ獲得完了 🎉';
}
function buildBoard(bd){
  const grid=Array(4).fill(null).map(()=>Array(5).fill(null));
  for(let i=1;i<=20;i++){const{r,c}=sqPos(i);grid[r][c]=i;}
  let h='<div class="sg-grid">';
  for(let r=0;r<4;r++){
    h+='<div class="sg-row">';
    for(let c=0;c<5;c++){
      const sq=grid[r][c];
      const isCur=sq===Math.max(1,bd);
      const isDone=bd>0&&sq<bd;
      const isDoneAt=bd>0&&sq<=bd;
      const isMs=[5,10,15,20].includes(sq);
      let cls='sq';
      if(isCur)cls+=' cur';
      else if(isDone)cls+=' done';
      if(isMs)cls+=' ms';
      if(isMs&&isDoneAt)cls+=' done';
      let inner='';
      if(isCur)inner=miniRobot(bd);
      else if(isDone&&isMs)inner=`<div style="font-size:9px;color:var(--brown-mid)">★</div>`;
      else if(isDone)inner=`<div style="width:6px;height:6px;border-radius:50%;background:var(--brown-mid);opacity:.5"></div>`;
      else if(isMs)inner=`<div style="font-size:9px;opacity:.2;color:var(--brown-mid)">★</div>`;
      else inner=`<div style="width:4px;height:4px;border-radius:50%;background:var(--border)"></div>`;
      const nc=isCur?'var(--brown-dark)':isDone?'var(--brown-mid)':'var(--text-muted)';
      const lbl=sq===20&&bd>=20?'GOAL':sq===1&&bd===0?'ST':String(sq);
      inner+=`<div class="sq-num" style="color:${nc}">${lbl}</div>`;
      h+=`<div class="${cls}">${inner}</div>`;
    }
    h+='</div>';
  }
  return h+'</div>';
}

/* ── RENDER STATES ── */
function showEmpty(){
  document.getElementById('body').innerHTML=`
    <div class="empty">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="20" stroke="#D4B896" stroke-width="1.5" stroke-dasharray="4 3"/>
        <path d="M24 14v10l6 4" stroke="#C4A47C" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div>メンバーを選ぶと<br>進捗が表示されます</div>
    </div>`;
  document.getElementById('ftr').style.display='none';
  document.getElementById('hdr-mode').textContent='';
  document.getElementById('hdr-mode').classList.remove('active');
}

function showFirst(u){
  document.getElementById('hdr-mode').textContent='';
  document.getElementById('hdr-mode').classList.remove('active');
  document.getElementById('body').innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;padding:8px 0;animation:fd .4s ease">
      <div style="animation:pop .55s cubic-bezier(.34,1.56,.64,1)">${robot(0,96,'wave 1.5s ease-in-out 3')}</div>
      <div class="bubble" style="margin-top:14px;width:100%">
        <strong>${u.name}さん、はじめまして！</strong><br>
        MondoAIへようこそ。一緒にAIリテラシーを身につけていきましょう。<br>
        まず最初に、現在の状態を確認するアセスメントを受けてください。
      </div>
      <button class="sp-btn" onclick="window.open('${SHAREPOINT_URL}','_blank')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        アセスメントを受ける（SharePoint）
      </button>
    </div>`;
  const ftr=document.getElementById('ftr');
  ftr.style.display='block';
  ftr.innerHTML=`<button class="ftr-btn primary" onclick="goTopic()">はじめる →</button>`;
}

function showRepeat(u){
  document.getElementById('hdr-mode').textContent='';
  document.getElementById('hdr-mode').classList.remove('active');
  const pct=Math.round(u.badges/20*100);
  document.getElementById('body').innerHTML=`
    <div style="animation:fd .3s ease">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div style="flex-shrink:0;animation:bob 2.8s ease-in-out infinite">${robot(u.badges,64,'')}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:700;color:var(--text-primary)">${u.name}さん</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:1px">${u.days}日目 · 前回：${u.prev}</div>
          <div style="display:flex;align-items:center;gap:7px;margin-top:8px">
            <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%"></div></div>
            <div style="font-size:10px;color:var(--brown-mid);font-weight:700;font-family:'DM Mono',monospace;white-space:nowrap">${u.badges}/20</div>
          </div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:3px">${nxtMs(u.badges)}</div>
        </div>
      </div>

      <div class="card">
        <div style="font-size:10px;color:var(--text-muted);letter-spacing:.08em;font-weight:500;margin-bottom:8px;text-transform:uppercase">進捗マップ</div>
        ${buildBoard(u.badges)}
      </div>

      <div style="background:var(--brown-bg);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:12px;color:var(--brown-dark);line-height:1.7;margin-bottom:10px">
        おかえりなさい、${u.name}さん。<br>前回の続きから始めましょう。
      </div>

      <button class="sp-btn" onclick="window.open('${SHAREPOINT_URL}','_blank')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        アセスメントを受ける（SharePoint）
      </button>
    </div>`;

  const ftr=document.getElementById('ftr');
  ftr.style.display='block';
  ftr.innerHTML=`<button class="ftr-btn primary" onclick="goTopic()">続きから始める →</button>`;
}

function goTopic(){alert('トピックページへ移動します');}

function selUser(u){
  curUser=u;
  document.querySelectorAll('.ua').forEach(el=>el.classList.toggle('sel',el.dataset.uid===u.id));
  if(u.first)showFirst(u);
  else showRepeat(u);
}

/* ── BUILD USER BAR ── */
const ul=document.getElementById('ulist');
USERS.forEach(u=>{
  const d=document.createElement('div');
  d.className='ua';d.dataset.uid=u.id;
  d.innerHTML=`<div class="av">${u.id}</div><div class="uname">${u.name}</div>`;
  d.onclick=()=>selUser(u);
  ul.appendChild(d);
});
</script>
</body>
</html>
