<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOA デモページ</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  margin: 0;
  background: #f5efe6;
  color: #4a4a4a;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #c97c5d;
}

.section {
  background: #fffaf3;
  padding: 20px;
  margin: 20px 0;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.section h2 {
  margin-top: 0;
  color: #7a6c5d;
}

.flow-step {
  margin: 25px 0;
}

.flow-step b {
  color: #c97c5d;
}

.image-box {
  margin-top: 10px;
}

.image-box img {
  width: 100%;
  border-radius: 8px;
  border: 1px solid #e0d6c8;
}

.video-placeholder {
  width: 100%;
  height: 260px;
  background: #e8dfd3;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  color: #7a6c5d;
  font-size: 14px;
}

.button {
  display: block;
  text-align: center;
  padding: 14px;
  margin-top: 30px;
  background: #c97c5d;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <h1>MOA デモ</h1>

  <!-- 概要 -->
  <div class="section">
    <h2>MOAとは</h2>
    <p>
      MOAは、AIを安全に業務で活用するための判断力を身につける教育プログラムです。<br>
      単なる知識ではなく、「なぜ危険なのか」「どう使うべきか」を理解することを目的としています。
    </p>
  </div>

  <!-- 特徴 -->
  <div class="section">
    <h2>なぜMOAなのか</h2>
    <p>
      従来の学習は知識の暗記が中心ですが、MOAでは実務での判断を重視しています。<br>
      実際の業務に近い形で理解を深めることで、より安全で実用的なAI活用が可能になります。
    </p>
  </div>

  <!-- フロー -->
  <div class="section">
    <h2>利用の流れ</h2>

    <div class="flow-step">
      <b>① ログイン</b>
      <div class="image-box">
        <img src="https://via.placeholder.com/800x400?text=Login">
      </div>
    </div>

    <div class="flow-step">
      <b>② トップページ</b>
      <div class="image-box">
        <img src="https://via.placeholder.com/800x400?text=Top">
      </div>
    </div>

    <div class="flow-step">
      <b>③ トピック選択</b>
      <div class="image-box">
        <img src="https://via.placeholder.com/800x400?text=Topics">
      </div>
    </div>

    <div class="flow-step">
      <b>④ 解説を確認</b>
      <div class="image-box">
        <img src="https://via.placeholder.com/800x400?text=Explanation">
      </div>
    </div>

    <div class="flow-step">
      <b>⑤ チェックで理解確認</b>
      <div class="image-box">
        <img src="https://via.placeholder.com/800x400?text=Check">
      </div>
    </div>

  </div>

  <!-- 動画 -->
  <div class="section">
    <h2>操作デモ</h2>
    <div class="video-placeholder">
      動画は後でここに追加されます
    </div>
  </div>

  <!-- 戻る -->
  <a href="index.html" class="button">トップへ戻る</a>

</div>

</body>
</html>
